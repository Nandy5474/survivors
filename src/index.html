<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 移动端优化 viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="幸存者 - 丧尸末世生存策略RPG">
  <meta name="author" content="Survivors Dev Team">

  <!-- PWA / 移动端适配 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="幸存者">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="msapplication-TileColor" content="#1a1a2e">

  <!-- 禁用电话/邮箱自动检测 -->
  <meta name="format-detection" content="telephone=no, email=no">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

  <title>幸存者 | Survivors</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- ========== Canvas 渲染层 (自底向上) ========== -->
  <div id="game-canvas-container">
    <!-- 第一层：战争迷雾 -->
    <canvas id="canvas-fog"></canvas>
    <!-- 第二层：地图 -->
    <canvas id="canvas-map"></canvas>
    <!-- 第三层：实体（角色/丧尸/道具） -->
    <canvas id="canvas-entity"></canvas>
    <!-- 第四层：特效（粒子/屏幕震动） -->
    <canvas id="canvas-fx"></canvas>
  </div>

  <!-- ========== UI 层 (HTML/CSS 覆盖) ========== -->
  <div id="ui-layer">
    <!-- 顶部 HUD -->
    <div id="hud-top">
      <div id="hud-map-name">废土某处</div>
      <div id="hud-resources" class="hud-panel">
        <span class="hud-item" id="hud-gold">💰 0</span>
        <span class="hud-item" id="hud-diamond">💎 0</span>
        <span class="hud-item" id="hud-food">🍖 0</span>
        <span class="hud-item" id="hud-water">💧 0</span>
        <span class="hud-item" id="hud-ammo">🔫 0</span>
      </div>
      <div id="hud-stats" class="hud-panel">
        <span class="hud-item" id="hud-hp">❤️ 100/100</span>
        <span class="hud-item" id="hud-sanity">🧠 80/100</span>
        <span class="hud-item" id="hud-day">📅 第 1 天</span>
        <span class="hud-item" id="hud-time">🕐 08:00</span>
      </div>
    </div>

    <!-- 底部操作栏 -->
    <div id="hud-bottom">
      <button class="hud-btn" id="btn-explore">探索</button>
      <button class="hud-btn" id="btn-base">基地</button>
      <button class="hud-btn" id="btn-inventory">背包</button>
      <button class="hud-btn" id="btn-mercenary">佣兵</button>
      <button class="hud-btn" id="btn-survivors">幸存者</button>
      <button class="hud-btn" id="btn-menu">菜单</button>
    </div>

    <!-- 对话框容器 -->
    <div id="dialog-container" class="hidden">
      <div id="dialog-box">
        <div id="dialog-speaker"></div>
        <div id="dialog-text"></div>
        <div id="dialog-choices"></div>
      </div>
    </div>

    <!-- 通知容器 -->
    <div id="notification-container"></div>

    <!-- 加载画面 -->
    <div id="loading-screen">
      <div id="loading-bar-container">
        <div id="loading-bar"></div>
      </div>
      <div id="loading-text">加载中...</div>
    </div>

    <!-- 菜单画面 -->
    <div id="menu-screen" class="hidden">
      <div id="menu-content">
        <h1 id="menu-title">幸存者</h1>
        <p id="menu-subtitle">Survivors</p>
        <div id="menu-options">
          <button class="menu-btn" id="menu-new-game">新游戏</button>
          <button class="menu-btn" id="menu-continue">继续游戏</button>
          <button class="menu-btn" id="menu-settings">设置</button>
        </div>
      </div>
    </div>

    <!-- 暂停遮罩 -->
    <div id="pause-overlay" class="hidden">
      <div id="pause-menu">
        <h2>游戏暂停</h2>
        <button class="menu-btn" id="pause-resume">继续</button>
        <button class="menu-btn" id="pause-save">保存</button>
        <button class="menu-btn" id="pause-quit">退出</button>
      </div>
    </div>

    <!-- 全屏大地图面板 -->
    <div id="map-panel" class="fullscreen-overlay hidden">
      <div id="map-panel-bg"></div>
      <div id="map-panel-content">
        <div id="map-panel-header">
          <h2 id="map-panel-title">地图</h2>
          <button class="map-panel-close-btn" id="map-close">✕</button>
        </div>
        <canvas id="canvas-fullmap"></canvas>
        <div id="map-panel-legend">
          <span class="map-legend-item"><span class="map-legend-dot explored"></span> 已探索</span>
          <span class="map-legend-item"><span class="map-legend-dot unexplored"></span> 未探索</span>
          <span class="map-legend-item"><span class="map-legend-dot player"></span> 玩家位置</span>
        </div>
      </div>
    </div>

    <!-- 背包面板 -->
    <div id="inventory-panel" class="panel-overlay hidden">
      <div class="panel-container">
        <div class="panel-header">
          <h2>🎒 背包</h2>
          <div class="panel-header-right">
            <span id="inv-slot-info" class="panel-info">0 / 30</span>
            <button class="panel-close-btn" id="inv-close">✕</button>
          </div>
        </div>
        <!-- 分类标签 -->
        <div id="inv-tabs" class="panel-tabs">
          <button class="tab-btn tab-active" data-cat="all">全部</button>
          <button class="tab-btn" data-cat="weapon">武器</button>
          <button class="tab-btn" data-cat="ammo">弹药</button>
          <button class="tab-btn" data-cat="medical">医疗</button>
          <button class="tab-btn" data-cat="food">食物</button>
          <button class="tab-btn" data-cat="materials">建材</button>
          <button class="tab-btn" data-cat="parts">零件</button>
        </div>
        <!-- 物品列表 -->
        <div id="inv-item-list" class="item-list"></div>
        <!-- 空提示 -->
        <div id="inv-empty" class="panel-empty">背包空空如也</div>
      </div>
    </div>

    <!-- 基地面板 -->
    <div id="base-panel" class="panel-overlay hidden">
      <div class="panel-container">
        <div class="panel-header">
          <h2>🏠 基地</h2>
          <button class="panel-close-btn" id="base-close">✕</button>
        </div>
        <!-- 基地状态栏 -->
        <div id="base-status" class="base-status-bar">
          <div class="base-stat">等级: <span id="base-level">1</span></div>
          <div class="base-stat">HP: <span id="base-hp">100</span> / <span id="base-maxhp">100</span></div>
          <div class="base-stat">防御: <span id="base-defense">0</span></div>
        </div>
        <!-- 资源库存 -->
        <div class="base-section">
          <h3>资源库存</h3>
          <div class="base-res-grid" id="base-res-grid">
            <div class="base-res-item">🍖 食物: <span id="base-res-food">0</span></div>
            <div class="base-res-item">💧 水: <span id="base-res-water">0</span></div>
            <div class="base-res-item">🪵 木材: <span id="base-res-wood">0</span></div>
            <div class="base-res-item">🪨 石材: <span id="base-res-stone">0</span></div>
            <div class="base-res-item">🔩 金属: <span id="base-res-metal">0</span></div>
            <div class="base-res-item">⚙️ 零件: <span id="base-res-parts">0</span></div>
          </div>
        </div>
        <!-- 设施 -->
        <div class="base-section">
          <h3>设施</h3>
          <div id="base-buildings-list" class="building-list"></div>
          <button id="base-build-btn" class="base-action-btn">🏗️ 新建设施</button>
          <div id="base-build-menu" class="base-build-menu hidden">
            <div id="base-build-options" class="base-build-options"></div>
            <button class="base-build-cancel-btn">取消</button>
          </div>
          <span id="base-build-slots" class="panel-info">建筑槽位: 0 / 2</span>
        </div>
        <!-- 基地升级 -->
        <div class="base-section">
          <h3>基地升级</h3>
          <div id="base-upgrade-info" class="base-upgrade-info"></div>
          <button id="base-upgrade-btn" class="base-action-btn">⬆️ 升级基地</button>
        </div>
        <!-- 每日报告 -->
        <div class="base-section" id="base-daily-section">
          <h3>每日报告</h3>
          <div id="base-daily-report" class="base-daily-report"></div>
        </div>
        <!-- 幸存者 -->
        <div class="base-section">
          <h3>幸存者</h3>
          <div id="base-survivors-list" class="survivor-list"></div>
          <span id="base-survivor-slots" class="panel-info">人口: 0 / 3</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== 横屏提示 ========== -->
  <div class="landscape-hint">请将屏幕横放以获得最佳游戏体验</div>

  <!-- ========== 横屏提示隐藏逻辑 ========== -->
  <script>
    (function() {
      const hint = document.querySelector('.landscape-hint');
      if (!hint) return;

      let hiddenForever = false;

      function updateHint() {
        if (hiddenForever) { hint.classList.add('hidden'); return; }
        const isPortrait = window.matchMedia('(orientation: portrait)').matches;
        hint.classList.toggle('hidden', !isPortrait);
      }

      function hideForever() {
        if (hiddenForever) return;
        hiddenForever = true;
        hint.classList.add('hidden');
      }

      // 监听朝向变化
      window.matchMedia('(orientation: portrait)').addEventListener('change', updateHint);
      window.matchMedia('(orientation: landscape)').addEventListener('change', updateHint);

      // 任意交互后永久隐藏
      ['click', 'touchstart', 'keydown'].forEach(evt => {
        window.addEventListener(evt, hideForever, { capture: true, once: false });
      });

      // 初始化
      updateHint();
    })();
  </script>

  <!-- ========== 游戏脚本 (ES Module) ========== -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
